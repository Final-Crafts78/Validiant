<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Validiant | Secure Sign In</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Premium Design System -->
  <link rel="stylesheet" href="src/styles/premium.css">
  <link rel="stylesheet" href="src/styles/signin.css">
</head>
<body class="signin-page">
  <div class="login-container">
    <!-- Left Side - Brand Appearance -->
    <div class="brand-side">
      <div class="brand-logo">
        <i class="fas fa-shield-alt"></i>
      </div>
      <h1 class="brand-title">Validiant</h1>
      <p class="brand-subtitle">
        Enterprise-grade security and field task management.<br>
        <strong>Secure • Transparent • High-Performance</strong>
      </p>
    </div>

    <!-- Right Side - Authentication Form -->
    <div class="form-side">
      <div class="form-header">
        <h2>Authentication</h2>
        <p>Enter your credentials to access the terminal.</p>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Corporate Email</label>
          <div class="input-wrapper">
            <i class="fas fa-envelope"></i>
            <input 
              type="email" 
              id="email" 
              class="form-control" 
              placeholder="user@validiant.com"
              required
            >
          </div>
        </div>

        <div class="form-group">
          <label for="password">Secure Password</label>
          <div class="input-wrapper">
            <i class="fas fa-lock"></i>
            <input 
              type="password" 
              id="password" 
              class="form-control" 
              placeholder="••••••••"
              required
            >
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-signin" id="signinBtn">
          <span>Authorize Access</span>
          <i class="fas fa-arrow-right"></i>
        </button>
      </form>

      <div class="divider">
        <span>External Providers</span>
      </div>

      <div class="social-buttons">
        <button class="btn-social" title="Sign in with Microsoft">
          <i class="fab fa-microsoft"></i>
        </button>
        <button class="btn-social" title="Sign in with Google">
          <i class="fab fa-google"></i>
        </button>
        <button class="btn-social" title="Sign in with GitHub">
          <i class="fab fa-github"></i>
        </button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script type="module" src="src/signin.js"></script>
</body>
</html>
