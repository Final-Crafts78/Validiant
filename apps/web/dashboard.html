<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0f172a">
  <title>Validiant | Enterprise Dashboard</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="src/styles/premium.css">
</head>
<body ontouchstart="">

  <aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="logo">
      <i class="fas fa-shield-alt"></i> 
      <span class="logo-text">&nbsp; Validiant</span>
    </div>
    <button class="sidebar-toggle" id="sidebarToggle" data-action="nav:toggleSidebar">
      <i class="fas fa-bars"></i>
    </button>
  </div>
  <nav id="sidebarMenu">
  </nav>
  </aside>

  <main class="main-content">
    <header class="header">
       <!-- Mobile Menu Toggle Button -->
  <button class="mobile-menu-toggle" id="mobileMenuToggle" data-action="nav:toggleSidebar">
    <i class="fas fa-bars"></i>
  </button>
      <div class="header-title" id="pageTitle">Dashboard</div>
      <div class="user-profile">
        <div class="user-avatar" id="userInitials">U</div>
        <div style="font-size: 14px;">
          <div id="userName" style="font-weight: 600;">Loading...</div>
          <div id="userRole" style="font-size: 11px; color: var(--text-muted);">...</div>
        </div>
        <button class="logout-btn" data-action="auth:logout"><i class="fas fa-sign-out-alt"></i></button>
      </div>
    </header>

    <div class="content-area" id="mainContainer">
      </div>
  </main>

  <div id="modalContainer" class="modal"></div>
    <div id="toast" class="toast"></div>


  <script type="module" src="src/main.js"></script>
</body>
</html>
